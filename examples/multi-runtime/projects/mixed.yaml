version: 2

project:
  id: mixed
  name: Mixed-Runtime
  cwd: .

channels:
  - name: all
    members: "*"

managers:
  manager:
    runtime: claude-code
    model: claude-opus-4-7
    telegram_inbox: true
    reports_to_user: true
    can_dm: [backend, researcher]
    can_broadcast: [all]

workers:
  backend:
    runtime: codex                 # OpenAI Codex CLI
    model: gpt-5-codex
    reports_to: manager
    can_dm: [manager]
    can_broadcast: [all]
  researcher:
    runtime: gemini                # Google Gemini CLI
    model: gemini-3.0-pro
    reports_to: manager
    can_dm: [manager]
    can_broadcast: [all]
