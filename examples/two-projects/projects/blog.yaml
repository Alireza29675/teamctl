version: 2

project:
  id: blog
  name: Blog
  cwd: .

channels:
  - name: all
    members: "*"

managers:
  editor:
    runtime: claude-code
    model: claude-opus-4-7
    telegram_inbox: true
    reports_to_user: true
    can_dm: [writer]
    can_broadcast: [all]

workers:
  writer:
    runtime: gemini
    model: gemini-3.0-pro
    reports_to: editor
    can_dm: [editor]
    can_broadcast: [all]
