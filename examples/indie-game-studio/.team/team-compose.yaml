version: 2

broker:
  type: sqlite
  path: state/mailbox.db

supervisor:
  type: tmux
  tmux_prefix: studio-

budget:
  daily_usd_limit: 15.0
  message_ttl_hours: 168           # design conversations live longer than a day

hitl:
  globally_sensitive_actions:
    - publish
    - release
    - external_email
    - external_api_post

# Telegram is configured on the director manager in projects/studio.yaml.
# Run `teamctl bot setup` to wire it up.

projects:
  - file: projects/studio.yaml
