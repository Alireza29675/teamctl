version: 2

broker:
  type: sqlite
  path: state/mailbox.db

supervisor:
  type: tmux
  tmux_prefix: startup-

budget:
  daily_usd_limit: 25.0
  message_ttl_hours: 72

hitl:
  globally_sensitive_actions:
    - publish
    - release
    - deploy
    - payment
    - external_email
    - external_api_post
    - merge_to_main

# Telegram bots are now declared on each manager in projects/startup.yaml.
# Run `teamctl bot setup` to walk through BotFather → token → /start →
# chat id and have it write the env vars + telegram blocks for you.

projects:
  - file: projects/startup.yaml
