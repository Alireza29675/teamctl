version: 2

project:
  id: startup
  name: Startup
  cwd: ./workspace

channels:
  - name: leads              # managers only — founder ↔ pm alignment
    members: [founder, product_manager]
  - name: product            # PM + engineers
    members: [product_manager, eng_lead, eng_ic, researcher]
  - name: all
    members: "*"

managers:
  founder:
    runtime: claude-code
    model: claude-opus-4-7
    role_prompt: roles/founder.md
    permission_mode: auto
    reports_to_user: true
    autonomy: low_risk_only
    can_dm: [product_manager, researcher]
    can_broadcast: [leads, all]
    # Run `teamctl bot setup --manager startup:founder` to populate.
    interfaces:
      telegram:
        bot_token_env: TEAMCTL_TG_FOUNDER_TOKEN
        chat_ids_env: TEAMCTL_TG_FOUNDER_CHATS

  product_manager:
    runtime: claude-code
    model: claude-opus-4-7
    role_prompt: roles/product_manager.md
    permission_mode: auto
    reports_to_user: true
    autonomy: low_risk_only
    can_dm: [founder, eng_lead, eng_ic, researcher]
    can_broadcast: [leads, product, all]
    # Run `teamctl bot setup --manager startup:product_manager` to populate.
    interfaces:
      telegram:
        bot_token_env: TEAMCTL_TG_PRODUCT_MANAGER_TOKEN
        chat_ids_env: TEAMCTL_TG_PRODUCT_MANAGER_CHATS

  # eng_lead is a manager of the engineering sub-team so eng_ic can
  # report to them directly.
  eng_lead:
    runtime: claude-code
    model: claude-opus-4-7
    role_prompt: roles/eng_lead.md
    permission_mode: auto
    reports_to_user: false
    autonomy: low_risk_only
    can_dm: [product_manager, eng_ic]
    can_broadcast: [product]

workers:
  eng_ic:
    runtime: codex
    model: gpt-5-codex
    role_prompt: roles/eng_ic.md
    reports_to: eng_lead
    can_dm: [eng_lead, product_manager]
    can_broadcast: [product]

  researcher:
    runtime: claude-code
    model: claude-sonnet-4-6
    role_prompt: roles/researcher.md
    reports_to: founder
    can_dm: [founder, product_manager]
    can_broadcast: [leads, product]
