version: 2

broker:
  type: sqlite
  path: state/mailbox.db

supervisor:
  type: tmux
  tmux_prefix: oss-

budget:
  daily_usd_limit: 20.0
  message_ttl_hours: 72

hitl:
  globally_sensitive_actions:
    - publish
    - release
    - deploy
    - merge_to_main
    - external_email
    - external_api_post

# Telegram is configured on the maintainer manager in projects/oss.yaml.
# Run `teamctl bot setup` to wire it up.

projects:
  - file: projects/oss.yaml
