version: 2

project:
  id: swarm
  name: Multi-Agent Swarm
  cwd: .

channels:
  - name: product
    members: [manager, dev1, dev2, critic]
  - name: internal
    members: [dev1, dev2]
  - name: all
    members: "*"

managers:
  manager:
    runtime: claude-code
    model: claude-opus-4-7
    telegram_inbox: true
    reports_to_user: true
    can_dm: [dev1, dev2, critic]
    can_broadcast: [product, all]

workers:
  dev1:
    runtime: claude-code
    model: claude-sonnet-4-6
    reports_to: manager
    can_dm: [manager, dev2, critic]
    can_broadcast: [product, internal]
  dev2:
    runtime: claude-code
    model: claude-sonnet-4-6
    reports_to: manager
    can_dm: [manager, dev1, critic]
    can_broadcast: [product, internal]
  critic:
    runtime: claude-code
    model: claude-opus-4-7
    permission_mode: plan
    reports_to: manager
    can_dm: [manager, dev1, dev2]
    can_broadcast: [product]
