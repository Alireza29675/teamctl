version: 2

project:
  id: triage
  name: Solo Triage
  cwd: ./workspace

channels:
  # Worker channels — research and inbox are insulated from each other
  # so context-chase notes don't bleed into the draft pile, and the
  # draft pile doesn't flood research. Each pairs the worker with the
  # manager.
  - name: research
    members: [manager, research]
  - name: inbox
    members: [manager, inbox]
  - name: all
    members: "*"

managers:
  manager:
    runtime: claude-code
    model: claude-opus-4-7
    role_prompt: roles/manager.md
    permission_mode: auto
    autonomy: low_risk_only
    can_dm: [research, inbox]
    can_broadcast: [research, inbox, all]
    # Run `teamctl bot setup` to populate.
    interfaces:
      telegram:
        bot_token_env: TEAMCTL_TG_MANAGER_TOKEN
        chat_ids_env: TEAMCTL_TG_MANAGER_CHATS

workers:
  research:
    runtime: claude-code
    model: claude-sonnet-4-6
    role_prompt: roles/research.md
    permission_mode: auto
    reports_to: manager
    can_dm: [manager]
    can_broadcast: [research]

  inbox:
    runtime: claude-code
    model: claude-sonnet-4-6
    role_prompt: roles/inbox.md
    permission_mode: auto
    reports_to: manager
    can_dm: [manager]
    can_broadcast: [inbox, all]
