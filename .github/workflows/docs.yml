name: docs

# Disabled on push pending a fix for the Astro + zod transitive
# breakage that makes `astro build` exit 1 with
# `Cannot read properties of undefined (reading '_zod')` in
# `node_modules/zod/v4/core/schemas.js`. The dep tree (Astro, Starlight,
# zod-to-json-schema, zod) needs to be re-pinned with a real
# `package-lock.json` generated from a local `npm install`. No Node
# toolchain was available at the time of disabling. Re-enable the
# `push:` trigger once the build is reliably green.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: docs
        run: npm install
      - name: Build
        working-directory: docs
        run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        if: ${{ github.ref == 'refs/heads/main' && env.CF_TOKEN != '' }}
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: teamctl-docs
          directory: docs/dist
