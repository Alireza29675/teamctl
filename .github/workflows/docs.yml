name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install
        working-directory: docs
        run: npm ci
      - name: Build
        working-directory: docs
        run: npm run build
      - name: Link check (internal, fail on broken)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --no-progress --base "${{ github.workspace }}/docs/dist" 'docs/dist/**/*.html'
          fail: true
      - name: Link check (external, warn-only)
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: --no-progress --max-concurrency 4 --base "${{ github.workspace }}/docs/dist" 'docs/dist/**/*.html'
          fail: false
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && env.CF_TOKEN != '' }}
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: teamctl-docs
          directory: docs/dist
