name: publish-crates

# Push every crate to crates.io after a release tag.
# Runs in parallel with cargo-dist's `Release` workflow (same trigger);
# they don't share state. crates.io publishing is independent of the
# GitHub Release / Homebrew tap that cargo-dist produces.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check workspace version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws_version="$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$ws_version" ]; then
            echo "::error::tag $tag does not match workspace version $ws_version"
            exit 1
          fi

      # Order matters: team-core has no internal deps and must publish first.
      - name: Publish team-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p team-core --locked

      - name: Wait for crates.io index to refresh
        run: sleep 30

      - name: Publish team-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p team-mcp --locked

      - name: Publish teamctl
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p teamctl --locked

      - name: Publish team-bot
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p team-bot --locked
