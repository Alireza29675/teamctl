name: release

# Triggered by pushing a `v*` tag. cargo-dist plans the artifacts in a single
# job, then cross-compiles and uploads to a GitHub Release; it updates the
# Homebrew tap. A separate `publish` job pushes each crate to crates.io.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  dist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.25.1/cargo-dist-installer.sh \
            | sh
      - name: Plan
        run: cargo dist plan --tag=${{ github.ref_name }}
      - name: Build
        run: cargo dist build --tag=${{ github.ref_name }}
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo dist host --tag=${{ github.ref_name }} --steps=create,upload

  publish-crates:
    name: publish to crates.io
    needs: dist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Verify the Cargo.toml workspace version matches the pushed tag —
      # crates.io is append-only, so a mismatch wastes a tag.
      - name: Check workspace version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws_version="$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$ws_version" ]; then
            echo "::error::tag $tag does not match workspace version $ws_version"
            exit 1
          fi

      # Order matters: team-core has no internal deps and must publish first.
      # The other three depend on team-core; once it is on crates.io they
      # can publish in any order.
      - name: Publish team-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p team-core --locked

      - name: Wait for crates.io index to refresh
        run: sleep 30

      - name: Publish team-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p team-mcp --locked

      - name: Publish teamctl
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p teamctl --locked

      - name: Publish team-bot
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p team-bot --locked
