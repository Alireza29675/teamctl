[workspace]
resolver = "2"
members = [
    "crates/team-core",
    "crates/teamctl",
    "crates/team-mcp",
    "crates/team-bot",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.78"
license = "MIT"
repository = "https://github.com/Alireza29675/teamctl"
homepage = "https://teamctl.run"
authors = ["Alireza Sheikholmolouki <alireza.sheikholmolouki@gmail.com>"]

[workspace.dependencies]
anyhow = "1"
thiserror = "1"
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
rusqlite = { version = "0.31", features = ["bundled"] }
notify = "6"
schemars = "0.8"
insta = { version = "1", features = ["yaml"] }
team-core = { path = "crates/team-core" }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
